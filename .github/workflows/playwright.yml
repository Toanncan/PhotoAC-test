name: PhotoAC-Test

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

  # Chạy tự động lúc 05:00 AM giờ Việt Nam (22:00 UTC)
  schedule:
    - cron: '0 22 * * *'

  # Cho phép trigger thủ công và chọn browser
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

permissions:
  contents: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENV_NAME: ${{ secrets.ENV_NAME }}
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ENV: staging
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # Clean old reports trước khi chạy
      - name: Clean old results
        run: npm run clean

      # PR → chỉ chạy chromium để tiết kiệm thời gian
      - name: Run Playwright tests (PR - Chromium only)
        if: github.event_name == 'pull_request'
        run: npx playwright test --project=chromium

      # Push to main/develop/dev → chạy tất cả browsers
      - name: Run Playwright tests (Push - All browsers)
        if: github.event_name == 'push'
        run: npx playwright test

      # Schedule → chạy tất cả browsers (regression nightly)
      - name: Run Playwright tests (Scheduled - All browsers)
        if: github.event_name == 'schedule'
        run: npx playwright test

      # Manual trigger → chọn browser theo input
      - name: Run Playwright tests (Manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.browser }}" = "all" ]; then
            npx playwright test
          else
            npx playwright test --project=${{ github.event.inputs.browser }}
          fi

      # ── Allure Report ────────────────────────────────────────────────────────

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      # ── Upload Artifacts ──────────────────────────────────────────────────────

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload Test Screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ github.run_number }}
          path: test-results/
          retention-days: 7
